<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">CodeRecall Reviewer architecture with Hindsight memory</title>
  <desc id="desc">A box diagram showing source code flowing through review detection, Hindsight memory recall, recommendation logic, adaptive feedback, and outcome storage.</desc>
  <rect width="1200" height="680" fill="#f7f8fb"/>
  <text x="72" y="78" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#14171f">CodeRecall Reviewer architecture</text>
  <text x="72" y="116" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" fill="#566070">Detection stays deterministic. Hindsight supplies review history at decision time.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#566070"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #c8ced8; stroke-width: 2; rx: 8; }
      .memory { fill: #eef6ff; stroke: #4b8fd8; stroke-width: 2; rx: 8; }
      .label { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 21px; font-weight: 700; fill: #14171f; }
      .detail { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 15px; fill: #566070; }
      .code { font-family: Consolas, Menlo, monospace; font-size: 14px; fill: #566070; }
      .arrow { stroke: #566070; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="box" x="74" y="190" width="210" height="118"/>
  <text class="label" x="104" y="236">Changed code</text>
  <text class="code" x="104" y="268">password = "..."</text>
  <text class="code" x="104" y="290">print("debug")</text>

  <path class="arrow" d="M286 249 H382"/>

  <rect class="box" x="390" y="190" width="230" height="118"/>
  <text class="label" x="420" y="232">Review engine</text>
  <text class="detail" x="420" y="263">reviewer.py</text>
  <text class="detail" x="420" y="286">Finds concrete issues</text>

  <path class="arrow" d="M622 249 H716"/>

  <rect class="memory" x="724" y="168" width="270" height="162"/>
  <text class="label" x="754" y="217">Hindsight memory</text>
  <text class="detail" x="754" y="250">Retains prior outcomes</text>
  <text class="detail" x="754" y="274">Recalls related reviews</text>
  <text class="code" x="754" y="303">bank_id="code-review-memory"</text>

  <path class="arrow" d="M859 332 V409"/>

  <rect class="box" x="724" y="418" width="270" height="118"/>
  <text class="label" x="754" y="463">Recommendation</text>
  <text class="detail" x="754" y="494">recommendation_engine.py</text>
  <text class="detail" x="754" y="517">Accepted vs ignored history</text>

  <path class="arrow" d="M724 477 H620"/>

  <rect class="box" x="390" y="418" width="230" height="118"/>
  <text class="label" x="420" y="463">Adaptive feedback</text>
  <text class="detail" x="420" y="494">Same finding, different</text>
  <text class="detail" x="420" y="517">advice based on memory</text>

  <path class="arrow" d="M390 477 H286"/>

  <rect class="box" x="74" y="418" width="210" height="118"/>
  <text class="label" x="104" y="463">Review outcome</text>
  <text class="detail" x="104" y="494">Accepted, ignored,</text>
  <text class="detail" x="104" y="517">rejected, fixed</text>

  <path class="arrow" d="M179 418 V352 C179 338 190 330 204 330 H724"/>
  <text x="252" y="358" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#566070">Outcome is retained for the next review</text>
</svg>
