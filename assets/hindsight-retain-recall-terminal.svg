<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Terminal screenshot showing Hindsight retain and recall calls</title>
  <desc id="desc">A dark terminal-style image showing Python code that retains a review outcome and recalls memories for a hardcoded password finding.</desc>
  <rect width="1200" height="650" fill="#111827"/>
  <rect x="52" y="48" width="1096" height="554" rx="10" fill="#0b1020" stroke="#263044"/>
  <circle cx="86" cy="80" r="7" fill="#ef4444"/>
  <circle cx="110" cy="80" r="7" fill="#f59e0b"/>
  <circle cx="134" cy="80" r="7" fill="#22c55e"/>
  <text x="172" y="86" font-family="Consolas,Menlo,monospace" font-size="15" fill="#94a3b8">coderecall-ai / Hindsight memory calls</text>

  <text x="86" y="136" font-family="Consolas,Menlo,monospace" font-size="18" fill="#38bdf8">$ python memory_reviewer.py sample_code.py</text>
  <text x="86" y="176" font-family="Consolas,Menlo,monospace" font-size="17" fill="#cbd5e1">from hindsight_client import Hindsight</text>
  <text x="86" y="208" font-family="Consolas,Menlo,monospace" font-size="17" fill="#cbd5e1">client = Hindsight(base_url="https://api.hindsight.vectorize.io", api_key=HINDSIGHT_API_KEY)</text>

  <text x="86" y="260" font-family="Consolas,Menlo,monospace" font-size="17" fill="#a7f3d0">client.retain(</text>
  <text x="118" y="292" font-family="Consolas,Menlo,monospace" font-size="17" fill="#cbd5e1">bank_id="code-review-memory",</text>
  <text x="118" y="324" font-family="Consolas,Menlo,monospace" font-size="17" fill="#cbd5e1">content="Issue: Hardcoded Password | Suggestion: Use env vars | Status: Ignored"</text>
  <text x="86" y="356" font-family="Consolas,Menlo,monospace" font-size="17" fill="#a7f3d0">)</text>

  <text x="86" y="418" font-family="Consolas,Menlo,monospace" font-size="17" fill="#fef3c7">memories = client.recall(</text>
  <text x="118" y="450" font-family="Consolas,Menlo,monospace" font-size="17" fill="#cbd5e1">bank_id="code-review-memory",</text>
  <text x="118" y="482" font-family="Consolas,Menlo,monospace" font-size="17" fill="#cbd5e1">query="Hardcoded password detected"</text>
  <text x="86" y="514" font-family="Consolas,Menlo,monospace" font-size="17" fill="#fef3c7">)</text>

  <text x="86" y="562" font-family="Consolas,Menlo,monospace" font-size="17" fill="#94a3b8"># Recall returns prior review outcomes that shape the next recommendation.</text>
</svg>
